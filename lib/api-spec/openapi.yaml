openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: TEMPO ADHD-friendly AI daily planner API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: tasks
    description: Task management
  - name: notes
    description: Note management
  - name: projects
    description: Project management
  - name: folders
    description: Folder/area management
  - name: tags
    description: Tag management
  - name: dailyPlans
    description: Daily plan management
  - name: preferences
    description: User preferences and memory
  - name: ai
    description: AI assistant endpoints
  - name: onboarding
    description: Onboarding flow
  - name: staging
    description: AI suggestion staging (Accept/Edit/Reject)
  - name: calendarEvents
    description: Calendar event management
  - name: noteLinks
    description: Bi-directional note linking
  - name: savedFilters
    description: Saved task filters
  - name: noteTemplates
    description: Note templates

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List all tasks
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [inbox, today, scheduled, done, cancelled]
        - name: projectId
          in: query
          schema:
            type: integer
        - name: folderId
          in: query
          schema:
            type: integer
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a new task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskBody"
      responses:
        "201":
          description: Created task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get a task by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: Not found
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskBody"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: Not found
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /tasks/{id}/complete:
    post:
      operationId: completeTask
      tags: [tasks]
      summary: Complete a task and auto-create next occurrence for recurring tasks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Completed task (and optionally the next recurring instance)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompleteTaskResponse"
        "404":
          description: Not found

  /notes:
    get:
      operationId: listNotes
      tags: [notes]
      summary: List all notes
      parameters:
        - name: projectId
          in: query
          schema:
            type: integer
        - name: folderId
          in: query
          schema:
            type: integer
        - name: periodType
          in: query
          schema:
            type: string
            enum: [weekly, monthly, yearly]
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Note"
    post:
      operationId: createNote
      tags: [notes]
      summary: Create a new note
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNoteBody"
      responses:
        "201":
          description: Created note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"

  /notes/{id}:
    get:
      operationId: getNote
      tags: [notes]
      summary: Get a note by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Note details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        "404":
          description: Not found
    patch:
      operationId: updateNote
      tags: [notes]
      summary: Update a note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNoteBody"
      responses:
        "200":
          description: Updated note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        "404":
          description: Not found
    delete:
      operationId: deleteNote
      tags: [notes]
      summary: Delete a note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectBody"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectBody"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /folders:
    get:
      operationId: listFolders
      tags: [folders]
      summary: List all folders
      responses:
        "200":
          description: List of folders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Folder"
    post:
      operationId: createFolder
      tags: [folders]
      summary: Create a new folder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFolderBody"
      responses:
        "201":
          description: Created folder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Folder"

  /folders/{id}:
    patch:
      operationId: updateFolder
      tags: [folders]
      summary: Update a folder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFolderBody"
      responses:
        "200":
          description: Updated folder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Folder"
        "404":
          description: Not found
    delete:
      operationId: deleteFolder
      tags: [folders]
      summary: Delete a folder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /tags:
    get:
      operationId: listTags
      tags: [tags]
      summary: List all tags
      responses:
        "200":
          description: List of tags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tag"
    post:
      operationId: createTag
      tags: [tags]
      summary: Create a new tag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTagBody"
      responses:
        "201":
          description: Created tag
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"

  /tags/{id}:
    delete:
      operationId: deleteTag
      tags: [tags]
      summary: Delete a tag
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /daily-plans:
    get:
      operationId: listDailyPlans
      tags: [dailyPlans]
      summary: List daily plans
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: List of daily plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailyPlan"
    post:
      operationId: createDailyPlan
      tags: [dailyPlans]
      summary: Create or update a daily plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDailyPlanBody"
      responses:
        "201":
          description: Created daily plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyPlan"

  /daily-plans/{id}:
    get:
      operationId: getDailyPlan
      tags: [dailyPlans]
      summary: Get a daily plan by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Daily plan details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyPlan"
        "404":
          description: Not found
    patch:
      operationId: updateDailyPlan
      tags: [dailyPlans]
      summary: Update a daily plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDailyPlanBody"
      responses:
        "200":
          description: Updated daily plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyPlan"
        "404":
          description: Not found

  /preferences:
    get:
      operationId: getPreferences
      tags: [preferences]
      summary: Get user preferences
      responses:
        "200":
          description: User preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreferenceMemory"
    put:
      operationId: updatePreferences
      tags: [preferences]
      summary: Update user preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePreferencesBody"
      responses:
        "200":
          description: Updated preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreferenceMemory"

  /memories:
    get:
      operationId: listMemories
      tags: [preferences]
      summary: List memory items
      responses:
        "200":
          description: List of memory items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MemoryItem"
    post:
      operationId: createMemory
      tags: [preferences]
      summary: Create a memory item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMemoryBody"
      responses:
        "201":
          description: Created memory item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryItem"

  /memories/{id}:
    delete:
      operationId: deleteMemory
      tags: [preferences]
      summary: Delete a memory item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /ai/chat:
    post:
      operationId: aiChat
      tags: [ai]
      summary: Send a message to the AI assistant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiChatBody"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiChatResponse"

  /ai/extract-tasks:
    post:
      operationId: aiExtractTasks
      tags: [ai]
      summary: Extract tasks from messy text input
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiExtractBody"
      responses:
        "200":
          description: Extracted tasks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiExtractResponse"

  /ai/chunk-task:
    post:
      operationId: aiChunkTask
      tags: [ai]
      summary: Break a large task into smaller subtasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiChunkBody"
      responses:
        "200":
          description: Chunked subtasks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiChunkResponse"

  /ai/prioritize:
    post:
      operationId: aiPrioritize
      tags: [ai]
      summary: Suggest priority ordering for tasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiPrioritizeBody"
      responses:
        "200":
          description: Prioritized tasks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiPrioritizeResponse"

  /ai/generate-plan:
    post:
      operationId: aiGeneratePlan
      tags: [ai]
      summary: Generate a daily plan from tasks and preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiGeneratePlanBody"
      responses:
        "200":
          description: Generated daily plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiGeneratePlanResponse"

  /onboarding:
    post:
      operationId: completeOnboarding
      tags: [onboarding]
      summary: Complete onboarding and save preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardingBody"
      responses:
        "200":
          description: Onboarding completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreferenceMemory"

  /staging:
    get:
      operationId: listStagedSuggestions
      tags: [staging]
      summary: List pending staged AI suggestions
      parameters:
        - name: type
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, accepted, rejected]
            default: pending
      responses:
        "200":
          description: List of staged suggestions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StagedSuggestion"
    post:
      operationId: createStagedSuggestion
      tags: [staging]
      summary: Stage an AI suggestion for review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStagedSuggestionBody"
      responses:
        "201":
          description: Created staged suggestion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StagedSuggestion"

  /staging/{id}:
    get:
      operationId: getStagedSuggestion
      tags: [staging]
      summary: Get a staged suggestion by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Staged suggestion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StagedSuggestion"

  /staging/{id}/accept:
    post:
      operationId: acceptStagedSuggestion
      tags: [staging]
      summary: Accept a staged suggestion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StagedSuggestion"

  /staging/{id}/reject:
    post:
      operationId: rejectStagedSuggestion
      tags: [staging]
      summary: Reject a staged suggestion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StagedSuggestion"

  /staging/{id}/data:
    patch:
      operationId: updateStagedSuggestionData
      tags: [staging]
      summary: Edit the data of a staged suggestion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  additionalProperties: true
              required:
                - data
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StagedSuggestion"

  /templates:
    get:
      operationId: listTemplates
      tags: [dailyPlans]
      summary: List available plan templates
      responses:
        "200":
          description: List of templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Template"

  /calendar-events:
    get:
      operationId: listCalendarEvents
      tags: [calendarEvents]
      summary: List calendar events
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of calendar events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarEvent"
    post:
      operationId: createCalendarEvent
      tags: [calendarEvents]
      summary: Create a calendar event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCalendarEventBody"
      responses:
        "201":
          description: Created event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"

  /calendar-events/{id}:
    get:
      operationId: getCalendarEvent
      tags: [calendarEvents]
      summary: Get a calendar event by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Calendar event details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"
        "404":
          description: Not found
    patch:
      operationId: updateCalendarEvent
      tags: [calendarEvents]
      summary: Update a calendar event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCalendarEventBody"
      responses:
        "200":
          description: Updated event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"
        "404":
          description: Not found
    delete:
      operationId: deleteCalendarEvent
      tags: [calendarEvents]
      summary: Delete a calendar event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /note-links:
    get:
      operationId: listNoteLinks
      tags: [noteLinks]
      summary: List note links for a given note
      parameters:
        - name: noteId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of linked notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NoteLink"
    post:
      operationId: createNoteLink
      tags: [noteLinks]
      summary: Create a link between two notes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNoteLinkBody"
      responses:
        "201":
          description: Created note link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteLink"

  /note-links/{id}:
    delete:
      operationId: deleteNoteLink
      tags: [noteLinks]
      summary: Delete a note link
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /saved-filters:
    get:
      operationId: listSavedFilters
      tags: [savedFilters]
      summary: List saved filters
      responses:
        "200":
          description: List of saved filters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavedFilter"
    post:
      operationId: createSavedFilter
      tags: [savedFilters]
      summary: Create a saved filter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSavedFilterBody"
      responses:
        "201":
          description: Created filter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedFilter"

  /saved-filters/{id}:
    delete:
      operationId: deleteSavedFilter
      tags: [savedFilters]
      summary: Delete a saved filter
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /note-templates:
    get:
      operationId: listNoteTemplates
      tags: [noteTemplates]
      summary: List note templates
      responses:
        "200":
          description: List of note templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NoteTemplate"
    post:
      operationId: createNoteTemplate
      tags: [noteTemplates]
      summary: Create a note template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNoteTemplateBody"
      responses:
        "201":
          description: Created template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteTemplate"

  /note-templates/{id}:
    delete:
      operationId: deleteNoteTemplate
      tags: [noteTemplates]
      summary: Delete a note template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /note-templates/seed:
    post:
      operationId: seedNoteTemplates
      tags: [noteTemplates]
      summary: Seed built-in note templates
      responses:
        "200":
          description: Seeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                required:
                  - count

  /notes/{id}/publish:
    post:
      operationId: publishNote
      tags: [notes]
      summary: Publish or unpublish a note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                isPublished:
                  type: boolean
              required:
                - isPublished
      responses:
        "200":
          description: Updated note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"

  /published/{slug}:
    get:
      operationId: getPublishedNote
      tags: [notes]
      summary: Get a published note by slug (public, no auth)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Published note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        "404":
          description: Not found

  /search:
    get:
      operationId: globalSearch
      tags: [notes]
      summary: Search across notes and tasks
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"

