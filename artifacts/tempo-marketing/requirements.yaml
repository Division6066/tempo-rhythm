  - path: "artifacts/tempo-marketing/public/images/focus-illustration.png"
    description: "Minimalist elegant line art illustration of a brain or human head in deep focus, surrounded by organized abstract geometric shapes. Warm light off-white background, subtle violet accents, clean."
