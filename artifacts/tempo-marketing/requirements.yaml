packages:
  "framer-motion": "For smooth page transitions, staggered reveals, and scroll animations required for a premium feel"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility to safely merge Tailwind CSS classes"

images:
