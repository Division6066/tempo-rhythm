kind = "mobile"
previewPath = "/mobile/"
title = "TEMPO Mobile"
version = "1.0.0"
id = "artifacts/tempo-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 18650

[services.development]
run = "pnpm --filter @workspace/tempo-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tempo-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/tempo-mobile", "run", "serve" ]

[services.env]
PORT = "18650"
BASE_PATH = "/mobile/"
