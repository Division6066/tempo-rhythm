<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>TEMPO — ADHD Planner</title>
    <meta name="description" content="An intelligent planner designed for ADHD minds — capture tasks, plan your day, and stay focused." />
    <meta name="theme-color" content="#1A1A2E" />

    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192x192.png" />
    <link rel="apple-touch-icon" href="/icon-192x192.png" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TEMPO" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="TEMPO — ADHD Planner" />
    <meta property="og:description" content="An intelligent planner designed for ADHD minds — capture tasks, plan your day, and stay focused." />
    <meta property="og:image" content="/opengraph.jpg" />
    <meta property="og:site_name" content="TEMPO" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TEMPO — ADHD Planner" />
    <meta name="twitter:description" content="An intelligent planner designed for ADHD minds — capture tasks, plan your day, and stay focused." />
    <meta name="twitter:image" content="/opengraph.jpg" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
      #app-loading {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1A1A2E;
        transition: opacity 0.3s ease-out;
      }
      #app-loading.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #app-loading .logo {
        font-family: 'Inter', system-ui, sans-serif;
        font-size: 48px;
        font-weight: 700;
        color: #E0E0FF;
        letter-spacing: -2px;
        animation: pulse-logo 1.5s ease-in-out infinite;
      }
      @keyframes pulse-logo {
        0%, 100% { opacity: 0.6; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.05); }
      }
    </style>
  </head>
  <body>
    <div id="app-loading">
      <div class="logo">T</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
