# Tempo Flow — Claude Code via GitHub Actions
#
# WHY THERE IS NO 'prompt:' INPUT:
#   Supplying 'prompt' puts the action into AUTOMATION mode, where it runs that
#   prompt as the task and IGNORES the @claude comment. Omitting it keeps the
#   action in TAG mode, where the @claude comment IS the task.
#   Standing orders live in CLAUDE.md -> docs/HARD_RULES.md, which Claude Code
#   reads automatically on every run. Do NOT re-add 'prompt:' here.

name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]

concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  claude:
    if: |
      contains(github.event.comment.body, '@claude') ||
      contains(github.event.issue.body, '@claude')

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Linear mirrors comments into GitHub as the 'linear-code' bot.
          # Without this the action refuses: "Workflow initiated by non-human
          # actor". ONLY this bot. NEVER use "*".
          allowed_bots: "linear-code"
