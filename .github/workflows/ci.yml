name: CI

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Package manager is `bun` for all CI steps (per HARD_RULES §2).
# Root package.json declares `packageManager: "bun@1.3.9"` and `bun.lock` is committed.

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run typecheck
        run: bun run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run lint
        run: bun run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    # TODO(Phase 3): root `test` script not yet defined in package.json.
    # Keeping continue-on-error until the script lands so CI does not block
    # unrelated PRs. Remove `continue-on-error` once `bun run test` exists.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run tests (best-effort until script exists)
        run: |
          if node -e "process.exit(require('./package.json').scripts?.test ? 0 : 1)" 2>/dev/null; then
            bun run test
          else
            echo "::notice::root 'test' script not yet implemented — Phase 3 will add it"
          fi

  scan:
    name: Scans (forbidden-tech, ram-only-audit, design-tokens)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # TODO(Phase 3): each scan script below is referenced by HARD_RULES
      # (§2 forbidden tech, §5 schema RAM-only, §7 design tokens) but is not
      # yet implemented in package.json. When a script is missing we log a
      # notice and succeed; when it exists we run it and fail on non-zero.
      - name: Forbidden-tech scan
        run: |
          if grep -q '"scan:forbidden-tech"' package.json; then
            bun run scan:forbidden-tech
          else
            echo "::notice::scan:forbidden-tech script not yet implemented"
          fi

      - name: RAM-only audit
        run: |
          if grep -q '"scan:ram-only-audit"' package.json; then
            bun run scan:ram-only-audit
          else
            echo "::notice::scan:ram-only-audit script not yet implemented"
          fi

      - name: Design-tokens scan
        run: |
          if grep -q '"scan:design-tokens"' package.json; then
            bun run scan:design-tokens
          else
            echo "::notice::scan:design-tokens script not yet implemented"
          fi
