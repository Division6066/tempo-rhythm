version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Jerusalem
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - automation

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Asia/Jerusalem
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - automation
    groups:
      tempo-workspace:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Asia/Jerusalem
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - automation
    groups:
      web-app:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /apps/mobile
    schedule:
      interval: weekly
      day: monday
      time: "07:30"
      timezone: Asia/Jerusalem
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - automation
    groups:
      mobile-app:
        patterns:
          - "*"
